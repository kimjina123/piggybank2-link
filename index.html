<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전기저금통2 앱 열기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f0f6ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #1a7ce8, #0d5abf);
      border-radius: 18px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .sub {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .spinner-wrap {
      margin: 0 auto 20px;
      width: 40px;
      height: 40px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #1a7ce8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 28px;
      min-height: 20px;
    }

    .btn-store {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }

    .btn-store:active { opacity: 0.8; }

    .btn-android {
      background: #34a853;
      color: #fff;
    }

    .btn-ios {
      background: #111827;
      color: #fff;
    }

    .btn-store svg {
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0;
      color: #d1d5db;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    /* 버튼 숨김 상태 */
    .store-section { display: none; }
  </style>
</head>
<body>

<div class="card">
  <div class="icon">⚡</div>
  <h1>전기저금통2</h1>
  <p class="sub">앱을 확인하는 중입니다.<br>잠시만 기다려주세요.</p>

  <div class="spinner-wrap">
    <div class="spinner" id="spinner"></div>
  </div>
  <div class="status" id="status">앱 실행 시도 중…</div>

  <!-- 폴백: 스토어 버튼 (JS로 표시) -->
  <div class="store-section" id="storeSection">
    <p class="sub" style="margin-bottom:16px;">앱이 설치되어 있지 않은 것 같아요.<br>아래에서 설치하세요.</p>

    <a id="btnAndroid" class="btn-store btn-android" href="#" style="display:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.523 15.341a.979.979 0 0 1-.98.98.979.979 0 0 1-.98-.98V9.956a.979.979 0 0 1 .98-.98.979.979 0 0 1 .98.98v5.385zm-9.086 0a.979.979 0 0 1-.98.98.979.979 0 0 1-.98-.98V9.956a.979.979 0 0 1 .98-.98.979.979 0 0 1 .98.98v5.385zm9.768-6.708L19.74 5.98a.418.418 0 0 0-.153-.572.418.418 0 0 0-.572.153l-1.556 2.695A7.847 7.847 0 0 0 14 7.5a7.847 7.847 0 0 0-3.46.756L9.985 5.56a.418.418 0 0 0-.572-.153.418.418 0 0 0-.153.572l1.535 2.654C8.854 9.672 7.5 11.6 7.5 13.8H20.5c0-2.2-1.354-4.128-3.295-5.167zM14 9.35a.65.65 0 1 1 0 1.3.65.65 0 0 1 0-1.3zm-4 0a.65.65 0 1 1 0 1.3.65.65 0 0 1 0-1.3z"/></svg>
      Google Play에서 설치
    </a>

    <a id="btnIos" class="btn-store btn-ios" href="#" style="display:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      App Store에서 설치
    </a>
  </div>
</div>

<script>
  (function () {
    var SCHEME_ANDROID = 'piggybank2://';
    var SCHEME_IOS     = 'energybank2://';
    var STORE_ANDROID  = 'https://play.google.com/store/apps/details?id=kr.gangwon.provin.energybank2&pcampaignid=web_share';
    var STORE_IOS      = 'https://apps.apple.com/kr/app/%EA%B0%95%EC%9B%90%EB%8F%84-%EC%9A%B0%EB%A6%AC%EC%A7%91-%EC%A0%84%EA%B8%B0%EC%A0%80%EA%B8%88%ED%86%B5-%EC%8B%9C%EC%A6%8C2/id1579642722';

    var statusEl      = document.getElementById('status');
    var spinnerEl     = document.getElementById('spinner');
    var storeSectionEl = document.getElementById('storeSection');
    var btnAndroid    = document.getElementById('btnAndroid');
    var btnIos        = document.getElementById('btnIos');

    function isIOS() {
      return /iphone|ipad|ipod/i.test(navigator.userAgent);
    }
    function isAndroid() {
      return /android/i.test(navigator.userAgent);
    }

    function showStoreFallback(platform) {
      spinnerEl.style.display = 'none';
      statusEl.textContent = '앱을 찾을 수 없어요.';
      storeSectionEl.style.display = 'block';

      if (platform === 'android') {
        btnAndroid.href = STORE_ANDROID;
        btnAndroid.style.display = 'flex';
      } else if (platform === 'ios') {
        btnIos.href = STORE_IOS;
        btnIos.style.display = 'flex';
      } else {
        // 데스크톱 등 — 둘 다 표시
        btnAndroid.href = STORE_ANDROID;
        btnAndroid.style.display = 'flex';
        btnIos.href = STORE_IOS;
        btnIos.style.display = 'flex';
      }
    }

    function tryOpen(scheme, platform) {
      var start = Date.now();

      // iframe 방식으로 스킴 시도 (카카오인앱브라우저 호환)
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = scheme;
      document.body.appendChild(iframe);

      // 1.8초 후 페이지가 여전히 포커스 상태면 앱 없는 것으로 판단
      setTimeout(function () {
        var elapsed = Date.now() - start;
        // 앱이 열렸다면 브라우저가 blur 되거나 빠르게 시간이 지남
        // 여기서는 단순히 폴백 표시 (가장 범용적)
        if (elapsed < 2500) {
          showStoreFallback(platform);
        }
      }, 1800);
    }

    // 실행
    if (isAndroid()) {
      statusEl.textContent = '안드로이드 앱 실행 중…';
      tryOpen(SCHEME_ANDROID, 'android');
    } else if (isIOS()) {
      statusEl.textContent = 'iOS 앱 실행 중…';
      // iOS는 location.href 방식이 더 안정적
      var start = Date.now();
      window.location.href = SCHEME_IOS;
      setTimeout(function () {
        if (Date.now() - start < 2000) {
          showStoreFallback('ios');
        }
      }, 1500);
    } else {
      // 데스크톱
      statusEl.textContent = '모바일 기기에서 접속해주세요.';
      spinnerEl.style.display = 'none';
      showStoreFallback('desktop');
    }
  })();
</script>

</body>
</html>
