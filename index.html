<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전기저금통2</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      background: #f0f6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .loading {
      text-align: center;
      color: #666;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e0e0e0;
      border-top-color: #1a7ce8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .fallback {
      max-width: 320px;
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: none;
    }
    .fallback h2 {
      font-size: 18px;
      margin: 0 0 16px;
      color: #111;
    }
    .fallback p {
      font-size: 14px;
      color: #666;
      margin: 0 0 24px;
      line-height: 1.5;
    }
    .btn {
      display: block;
      padding: 14px 16px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      color: white;
    }
    .btn-android {
      background: #34a853;
    }
    .btn-ios {
      background: #111;
    }
  </style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>앱으로 이동 중입니다.</p>
</div>

<div class="fallback" id="fallback">
  <h2>전기저금통2</h2>
  <p>앱이 설치되어 있지 않아요.<br>스토어에서 설치하세요.</p>
  <a class="btn btn-android" id="btnAndroid" href="#">Google Play 설치</a>
  <a class="btn btn-ios" id="btnIos" href="#">App Store 설치</a>
</div>

<script>
(function() {
  var storeAndroid = 'https://play.google.com/store/apps/details?id=kr.gangwon.provin.energybank2&pcampaignid=web_share';
  var storeIos = 'https://apps.apple.com/kr/app/%EA%B0%95%EC%9B%90%EB%8F%84-%EC%9A%B0%EB%A6%AC%EC%A7%91-%EC%A0%84%EA%B8%B0%EC%A0%80%EA%B8%B0%ED%86%B5-%EC%8B%9C%EC%A6%8C2/id1579642722';
  
  function isAndroid() {
    return /android/i.test(navigator.userAgent);
  }
  
  function isIOS() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
  }
  
  // 즉시 리다이렉트 (페이지 로드 기다리지 않음)
  if (isAndroid()) {
    window.location.href = storeAndroid;
  } else if (isIOS()) {
    window.location.href = storeIos;
  }
  // 데스크톱이면 fallback UI 표시
})();
</script>

</body>
</html>
